services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - goldsvet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    expose:
      - "8080"
    networks:
      - goldsvet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-goldsvet}:${POSTGRES_PASSWORD:-goldsvet_dev_password}@postgres:5432/${POSTGRES_DB:-goldsvet}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: http://localhost:${PUBLIC_PORT:-8080}
      PROVIDER_WEBHOOK_SECRET: ${PROVIDER_WEBHOOK_SECRET:-dev-provider-secret}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - goldsvet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q healthy"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goldsvet}
      POSTGRES_USER: ${POSTGRES_USER:-goldsvet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goldsvet_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - goldsvet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldsvet} -d ${POSTGRES_DB:-goldsvet}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - goldsvet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

networks:
  goldsvet:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
